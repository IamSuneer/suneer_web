<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3050"/>
      <stop offset="100%" stop-color="#0e1e30"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="120" cy="90"  r="80" fill="rgba(59,130,246,0.07)"/>
  <circle cx="680" cy="370" r="110" fill="rgba(139,92,246,0.07)"/>

  <!-- Browser chrome mockup -->
  <rect x="100" y="60" width="600" height="330" rx="10" fill="rgba(15,23,42,0.8)" stroke="rgba(59,130,246,0.25)" stroke-width="1.5"/>
  <rect x="100" y="60" width="600" height="36"  rx="10" fill="rgba(30,58,95,0.6)"/>
  <!-- Traffic lights -->
  <circle cx="125" cy="78" r="6" fill="rgba(239,68,68,0.6)"/>
  <circle cx="145" cy="78" r="6" fill="rgba(234,179,8,0.6)"/>
  <circle cx="165" cy="78" r="6" fill="rgba(34,197,94,0.6)"/>
  <!-- URL bar -->
  <rect x="185" y="67" width="400" height="22" rx="11" fill="rgba(15,23,42,0.6)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="385" y="83" font-family="monospace" font-size="11" text-anchor="middle" fill="rgba(148,163,184,0.6)">suneer.dev</text>

  <!-- Page content mockup -->
  <rect x="130" y="115" width="200" height="14" rx="7" fill="rgba(59,130,246,0.25)"/>
  <rect x="130" y="140" width="320" height="10" rx="5" fill="rgba(148,163,184,0.12)"/>
  <rect x="130" y="158" width="280" height="10" rx="5" fill="rgba(148,163,184,0.12)"/>
  <rect x="130" y="176" width="300" height="10" rx="5" fill="rgba(148,163,184,0.12)"/>
  <rect x="130" y="205" width="90"  height="32" rx="8" fill="rgba(59,130,246,0.6)"/>
  <rect x="232" y="205" width="90"  height="32" rx="8" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.4)" stroke-width="1"/>

  <!-- Right side avatar placeholder -->
  <circle cx="590" cy="210" r="65" fill="rgba(30,58,95,0.7)" stroke="rgba(59,130,246,0.3)" stroke-width="1.5"/>
  <text x="590" y="226" font-family="Inter,sans-serif" font-size="36" font-weight="900"
        text-anchor="middle" fill="rgba(147,197,253,0.5)">SR</text>

  <!-- Bottom badge row -->
  <rect x="130" y="330" width="80"  height="22" rx="11" fill="rgba(59,130,246,0.2)"/>
  <rect x="220" y="330" width="70"  height="22" rx="11" fill="rgba(59,130,246,0.2)"/>
  <rect x="300" y="330" width="60"  height="22" rx="11" fill="rgba(59,130,246,0.2)"/>
  <text x="170" y="345" font-family="Inter,sans-serif" font-size="10" text-anchor="middle" fill="rgba(147,197,253,0.7)">ASP.NET</text>
  <text x="255" y="345" font-family="Inter,sans-serif" font-size="10" text-anchor="middle" fill="rgba(147,197,253,0.7)">EF Core</text>
  <text x="330" y="345" font-family="Inter,sans-serif" font-size="10" text-anchor="middle" fill="rgba(147,197,253,0.7)">SQLite</text>
</svg>
