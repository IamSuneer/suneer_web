<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#060c18"/>
      <stop offset="100%" stop-color="#0c1829"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(59,130,246,0.05)" stroke-width="1"/>

  <!-- Brand mark -->
  <text x="100" y="170" font-family="monospace" font-size="64" font-weight="900" fill="#3b82f6">&lt;</text>
  <text x="151" y="170" font-family="monospace" font-size="64" font-weight="900" fill="#f1f5f9">SR</text>
  <text x="263" y="170" font-family="monospace" font-size="64" font-weight="900" fill="#8b5cf6">/&gt;</text>

  <!-- Name -->
  <text x="100" y="280" font-family="Inter,system-ui,sans-serif" font-size="72" font-weight="900"
        fill="#f1f5f9" letter-spacing="-2">Suneer Ranjitkar</text>

  <!-- Title -->
  <text x="100" y="348" font-family="Inter,system-ui,sans-serif" font-size="34" font-weight="600"
        fill="url(#titleGrad)">Full-Stack .NET Developer</text>
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Divider -->
  <rect x="100" y="372" width="60" height="4" rx="2" fill="url(#titleGrad)"/>

  <!-- Tech pills row -->
  <rect x="100" y="400" width="145" height="36" rx="18" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="173" y="423" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="rgba(147,197,253,0.9)">ASP.NET Core</text>

  <rect x="258" y="400" width="80" height="36" rx="18" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="298" y="423" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="rgba(147,197,253,0.9)">React</text>

  <rect x="352" y="400" width="80" height="36" rx="18" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="392" y="423" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="rgba(147,197,253,0.9)">Azure</text>

  <rect x="446" y="400" width="87" height="36" rx="18" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <text x="490" y="423" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" text-anchor="middle" fill="rgba(147,197,253,0.9)">Docker</text>

  <!-- Location + availability -->
  <circle cx="104" cy="480" r="5" fill="rgba(34,197,94,0.9)"/>
  <text x="117" y="485" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="500" fill="rgba(148,163,184,0.8)">Available · Kathmandu, Nepal · suneer.dev</text>

  <!-- Right avatar -->
  <circle cx="1020" cy="315" r="145" fill="rgba(30,58,95,0.5)" stroke="rgba(59,130,246,0.25)" stroke-width="2"/>
  <text x="1020" y="366" font-family="Inter,system-ui,sans-serif" font-size="96" font-weight="900"
        text-anchor="middle" fill="rgba(147,197,253,0.5)">SR</text>
</svg>
