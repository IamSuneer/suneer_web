<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e2030"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="700" cy="80"  r="90"  fill="rgba(16,185,129,0.06)"/>
  <circle cx="100" cy="380" r="100" fill="rgba(59,130,246,0.06)"/>

  <!-- Kanban board mockup -->
  <!-- Column 1 -->
  <rect x="80"  y="70" width="180" height="310" rx="8" fill="rgba(15,30,50,0.8)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <rect x="80"  y="70" width="180" height="36"  rx="8" fill="rgba(16,185,129,0.2)"/>
  <text x="170" y="93"  font-family="Inter,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="rgba(52,211,153,0.9)">TO DO</text>
  <rect x="95"  y="120" width="150" height="55" rx="6" fill="rgba(30,58,95,0.6)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <rect x="95"  y="185" width="150" height="55" rx="6" fill="rgba(30,58,95,0.6)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <rect x="95"  y="250" width="150" height="55" rx="6" fill="rgba(30,58,95,0.6)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>

  <!-- Column 2 -->
  <rect x="310" y="70" width="180" height="310" rx="8" fill="rgba(15,30,50,0.8)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <rect x="310" y="70" width="180" height="36"  rx="8" fill="rgba(59,130,246,0.2)"/>
  <text x="400" y="93"  font-family="Inter,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="rgba(147,197,253,0.9)">IN PROGRESS</text>
  <rect x="325" y="120" width="150" height="55" rx="6" fill="rgba(30,58,95,0.6)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
  <rect x="325" y="185" width="150" height="55" rx="6" fill="rgba(30,58,95,0.6)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>

  <!-- Column 3 -->
  <rect x="540" y="70" width="180" height="310" rx="8" fill="rgba(15,30,50,0.8)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <rect x="540" y="70" width="180" height="36"  rx="8" fill="rgba(139,92,246,0.2)"/>
  <text x="630" y="93"  font-family="Inter,sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="rgba(196,181,253,0.9)">DONE</text>
  <rect x="555" y="120" width="150" height="55" rx="6" fill="rgba(30,58,95,0.6)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <rect x="555" y="185" width="150" height="55" rx="6" fill="rgba(30,58,95,0.6)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <rect x="555" y="250" width="150" height="55" rx="6" fill="rgba(30,58,95,0.6)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>

  <!-- SignalR live dot -->
  <circle cx="400" cy="415" r="5" fill="rgba(52,211,153,0.9)"/>
  <text x="413" y="420" font-family="Inter,sans-serif" font-size="11" font-weight="600" fill="rgba(52,211,153,0.7)">Real-time via SignalR</text>
</svg>
